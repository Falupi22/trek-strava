version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bikehealth
      POSTGRES_USER: bikehealth
      POSTGRES_PASSWORD: bikehealth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bikehealth"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API (Fastify) ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bikehealth:bikehealth@db:5432/bikehealth
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src

  # ── DB migration job (runs once then exits) ───────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    command: sh -c "cd /app/apps/api && npx prisma migrate deploy"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bikehealth:bikehealth@db:5432/bikehealth
    restart: "no"

  # ── Background worker (Strava sync cron) ─────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    command: sh -c "cd /app/apps/api && npx tsx watch src/worker.ts"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bikehealth:bikehealth@db:5432/bikehealth
    volumes:
      - ./apps/api/src:/app/apps/api/src

  # ── Web (Vite dev server) ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: "http://api:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/vite.config.ts:/app/apps/web/vite.config.ts
      - ./packages/shared/src:/app/packages/shared/src

volumes:
  postgres_data:
