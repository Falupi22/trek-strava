server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve upstream DNS on each request to handle Railway redeploys
    resolver 100.100.100.100 valid=10s ipv6=off;
    set $api ${API_UPSTREAM};

    location /api/ {
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
